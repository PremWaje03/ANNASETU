spring.application.name=annasetu-backend
server.port=8081

# PostgreSQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/annasetu_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Prem7276}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
app.jwt.secret=VGhpc0lzQVNlY3VyZUFubmFzZXR1SldUU2VjcmV0S2V5Rm9yUHJvZHVjdGlvbjEyMw==
app.jwt.expiration-ms=86400000

# WebSocket
app.websocket.allowed-origins=http://localhost:5173,http://localhost:3000
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Uploads
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# Expiry Alert Scheduler
app.expiry.scheduler-ms=60000

# Logging
logging.level.org.springframework.security=INFO
