spring.application.name=annasetu-backend

# Keep local and production clearly separated.
# Local profile is default for development machines.
spring.profiles.default=local

# JWT
app.jwt.secret=VGhpc0lzQVNlY3VyZUFubmFzZXR1SldUU2VjcmV0S2V5Rm9yUHJvZHVjdGlvbjEyMw==
app.jwt.expiration-ms=86400000

# WebSocket / CORS
app.websocket.allowed-origins=${APP_WEBSOCKET_ORIGINS:http://localhost:5173,http://localhost:3000,https://annasetu.vercel.app,https://annasetu-ruddy.vercel.app}
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:3000,https://annasetu.vercel.app,https://annasetu-ruddy.vercel.app}

# Uploads
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# Expiry Alert Scheduler
app.expiry.scheduler-ms=60000

# Logging
logging.level.org.springframework.security=INFO
