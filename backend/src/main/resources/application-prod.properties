spring.application.name=annasetu-backend
server.port=${PORT:8080}

# MySQL Configuration (Production - from Environment Variables)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate - Validate only in production (no schema changes)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT - Use environment variable for production
app.jwt.secret=${JWT_SECRET:VGhpc0lzQVNlY3VyZUFubmFzZXR1SldUU2VjcmV0S2V5Zm9yUHJvZHVjdGlvbjEyMw==}
app.jwt.expiration-ms=86400000

# WebSocket & CORS - Allow Vercel frontend
app.websocket.allowed-origins=${APP_WEBSOCKET_ORIGINS:https://annasetu.vercel.app,http://localhost:3000}
app.cors.allowed-origins=${APP_CORS_ORIGINS:https://annasetu.vercel.app,http://localhost:3000}

# Uploads - Use system temp directory in production
app.upload.dir=${APP_UPLOAD_DIR:/tmp/annasetu-uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# Expiry Alert Scheduler
app.expiry.scheduler-ms=60000

# Logging - Production level
logging.level.root=INFO
logging.level.com.annasetu=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# Performance & Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Application Server Configuration
server.compression.enabled=true
server.compression.min-response-size=1024
server.http2.enabled=true

# Production Security
server.error.include-message=always
server.error.include-binding-errors=always
