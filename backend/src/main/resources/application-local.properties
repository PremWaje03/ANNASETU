server.port=8081

# Local-only database: in-memory H2 with PostgreSQL compatibility.
# This avoids file-lock conflicts when restarting devtools.
spring.datasource.url=jdbc:h2:mem:annasetu_dev;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Local JPA behavior
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Disable devtools LiveReload port noise in local terminal logs.
spring.devtools.livereload.enabled=false

# Optional local H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
